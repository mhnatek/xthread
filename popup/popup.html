<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xthread</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <span class="logo">xthread</span>
  </header>

  <div id="status">Initialising…</div>

  <textarea
    id="output"
    readonly
    rows="15"
    placeholder="Thread text will appear here…"
  ></textarea>

  <div id="controls">
    <button id="btn-copy" disabled>Copy</button>
    <button id="btn-reload">Add</button>
    <button id="btn-clear">Clear</button>
    <span id="tweet-count"></span>
  </div>

  <div id="error-box" hidden></div>

  <script src="popup.js"></script>
</body>
</html>
